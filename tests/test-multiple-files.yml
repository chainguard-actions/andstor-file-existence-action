name: Test multiple files input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action-all-exist
        uses: .
        with:
          files: "action.yml,dist/index.js"
      - name: Assert files_exists is true when all files exist
        env:
          ACTUAL: ${{ steps.action-all-exist.outputs.files_exists }}
        run: |
          echo "actual: $ACTUAL"
          if [ "$ACTUAL" != "true" ]; then
            echo "FAIL: expected 'true' but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - id: action-some-missing
        uses: .
        with:
          files: "action.yml,this-file-does-not-exist-xyz123.txt"
      - name: Assert files_exists is false when some files are missing
        env:
          ACTUAL: ${{ steps.action-some-missing.outputs.files_exists }}
        run: |
          echo "actual: $ACTUAL"
          if [ "$ACTUAL" != "false" ]; then
            echo "FAIL: expected 'false' but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
