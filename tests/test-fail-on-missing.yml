name: Test fail on missing files
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          files: "this-file-does-not-exist-xyz123.txt"
          fail: true
      - name: Assert action failed when file is missing and fail=true
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS"
